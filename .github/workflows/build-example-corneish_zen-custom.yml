name: 'My Custom'
on: workflow_dispatch
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      board: '["nice_nano_v2"]'
      shield: '["corne_left","corne_right]'
      alphas: '["qwerty"]'
      extra: '["default"]'
      tap: '["qwerty"]'
      nav: '["vi"]'
